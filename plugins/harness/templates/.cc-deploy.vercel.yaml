# /loop-deploy config — Vercel. Committed per-project.
#
# SINGLE APP (default below): the repo root is linked to ONE Vercel project
# (`.vercel/` at the root). Every command operates on that link.
#
# MONOREPO (multiple Vercel projects, e.g. apps/* each linked): the root link —
# if one even exists — reaches only one project, so the defaults below would
# silently deploy a single app. Scope the Vercel commands per app with the
# global `--cwd <app-dir>` flag (a deployable root app is `--cwd .`), e.g.:
#   deploy:   "vercel deploy --prod --cwd apps/web && vercel deploy --prod --cwd apps/api"
#   watch:    "true"   # each chained deploy above already blocks until it resolves
#   verify:   "curl -fsS https://web.example.com/health >/dev/null && curl -fsS https://api.example.com/health >/dev/null"
#   rollback: "r=0; vercel rollback --cwd apps/web || r=1; vercel rollback --cwd apps/api || r=1; test $r -eq 0"
# `deploy`/`verify` chain with `&&` (fail fast); `rollback` uses the flag
# chain above so every app's rollback is attempted AND any single failure
# still fails the whole command — the gate treats rollback exit 0 as "prod
# safe", so never `&&` (skips apps) or `;` (masks failures). Compose smoke +
# error-rate checks into `verify` per app, like the single-app default below.
# List EVERY deployable app in deploy, verify, AND rollback — an app missing
# from `rollback` stays broken when the loop rolls back.
deploy: "vercel deploy --prod"     # command that deploys (the agent runs it once per attempt)
watch: "vercel inspect --wait"     # blocks until the deploy resolves
# verify: a single command that is 0 iff prod is healthy — compose health + smoke + error-rate:
verify: "curl -fsS https://app.example.com/health >/dev/null && npm run smoke:prod && npm run check:error-rate"
rollback: "vercel rollback"        # run when max_redeploys is exceeded — never leave prod broken
max_redeploys: 3
migrations_gate: true              # a DB migration deploy needs a SECOND explicit approval
