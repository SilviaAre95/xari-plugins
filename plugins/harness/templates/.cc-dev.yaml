# /loop-dev config. Committed per-project.
graders: [code-review, security, bugs]   # review stages the agent must run + pass
                                          # add `design` for frontend repos (design:layout-review);
                                          # any other name maps to the skill of the same name
# max_review_rounds: 3                    # stop attempts without a clean marker before the review breaker trips
max_retries: 3                            # failed deterministic attempts before circuit breaker
base: main                                # diff base the reviews compare against
open_pr: true                             # false = stop at green, do not open a PR
